name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e . pytest
      - name: Run engine tests
        run: pytest -q

  gui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tk and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
      - name: Boot the GUI headless and play 15 hands
        run: xvfb-run -a python3 tests/gui_smoke.py

  godot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.7.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: false
      - name: Import project (builds .godot cache; GUT class_names load here)
        working-directory: godot
        run: godot --headless --path . --import
      - name: Run GUT tests headless
        working-directory: godot
        run: >-
          godot --headless --path .
          -s addons/gut/gut_cmdln.gd
          -gdir=res://test/unit
          -gexit
          | tee gut_output.txt
      - name: Fail if GUT produced no run summary
        working-directory: godot
        run: |
          if ! grep -q "Run Summary" gut_output.txt; then
            echo "::error::GUT did not emit a run summary - tests did not execute (likely an import/class_name failure)."
            exit 1
          fi
          if grep -qE "[1-9][0-9]* failing tests" gut_output.txt; then
            echo "::error::GUT reported failing tests."
            exit 1
          fi
          echo "GUT run summary present and no failures."