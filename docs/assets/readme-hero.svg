<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">Texas Hold'em project banner</title>
  <desc id="desc">A refined poker table, playing cards, chips, and connected peer nodes beside the project title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102b24"/>
      <stop offset="0.48" stop-color="#091a16"/>
      <stop offset="1" stop-color="#050b09"/>
    </linearGradient>
    <radialGradient id="felt" cx="50%" cy="42%" r="66%">
      <stop offset="0" stop-color="#1a5c47"/>
      <stop offset="0.72" stop-color="#104333"/>
      <stop offset="1" stop-color="#0a2c23"/>
    </radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0c58a"/>
      <stop offset="0.5" stop-color="#c7864f"/>
      <stop offset="1" stop-color="#8f5938"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#e9dfcf"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#f2dfbf" opacity="0.12"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1280" height="460" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="460" rx="30" fill="url(#dots)"/>
  <circle cx="165" cy="70" r="170" fill="#2c7a5e" opacity="0.12" filter="url(#soft)"/>
  <circle cx="1110" cy="390" r="190" fill="#c7864f" opacity="0.08" filter="url(#soft)"/>
  <path d="M640 40V420" stroke="#f2dfbf" stroke-opacity="0.09"/>

  <g font-family="Aptos, Segoe UI, sans-serif">
    <text x="72" y="76" fill="#d9aa70" font-size="14" font-weight="700" letter-spacing="3.2">
      OPEN SOURCE / PLAY MONEY / ACTIVE DEVELOPMENT
    </text>
    <text x="68" y="164" fill="#f6efdf" font-family="Georgia, Times New Roman, serif" font-size="72" font-weight="700" letter-spacing="3">
      TEXAS
    </text>
    <text x="68" y="237" fill="#f6efdf" font-family="Georgia, Times New Roman, serif" font-size="72" font-weight="700" letter-spacing="1.5">
      HOLD'EM
    </text>
    <rect x="72" y="262" width="92" height="4" rx="2" fill="url(#copper)"/>
    <text x="72" y="306" fill="#dbe8df" font-size="21" font-weight="650" letter-spacing="1.1">
      GODOT CLIENT. PYTHON CORE.
    </text>
    <text x="72" y="338" fill="#dbe8df" font-size="21" font-weight="650" letter-spacing="1.1">
      HOSTLESS BY DESIGN.
    </text>
    <text x="72" y="379" fill="#a8bdb2" font-size="16">
      Rules-correct poker with a tested mental-poker protocol.
    </text>

    <g transform="translate(72 402)">
      <rect width="142" height="30" rx="15" fill="#f6efdf" fill-opacity="0.08" stroke="#f6efdf" stroke-opacity="0.17"/>
      <text x="71" y="20" text-anchor="middle" fill="#dbc7a8" font-size="11" font-weight="700" letter-spacing="1.2">350 PYTHON TESTS</text>
    </g>
    <g transform="translate(226 402)">
      <rect width="154" height="30" rx="15" fill="#f6efdf" fill-opacity="0.08" stroke="#f6efdf" stroke-opacity="0.17"/>
      <text x="77" y="20" text-anchor="middle" fill="#dbc7a8" font-size="11" font-weight="700" letter-spacing="1.2">SIGNED P2P STATE</text>
    </g>
    <g transform="translate(392 402)">
      <rect width="104" height="30" rx="15" fill="#f6efdf" fill-opacity="0.08" stroke="#f6efdf" stroke-opacity="0.17"/>
      <text x="52" y="20" text-anchor="middle" fill="#dbc7a8" font-size="11" font-weight="700" letter-spacing="1.2">MIT LICENSE</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="979" cy="235" rx="242" ry="162" fill="#07110e" stroke="url(#copper)" stroke-width="5"/>
    <ellipse cx="979" cy="235" rx="224" ry="145" fill="url(#felt)" stroke="#e4c398" stroke-opacity="0.28" stroke-width="2"/>
    <ellipse cx="979" cy="235" rx="176" ry="105" fill="none" stroke="#f4e6ce" stroke-opacity="0.14"/>
  </g>

  <g stroke="#e9c28d" stroke-width="1.8" stroke-opacity="0.58">
    <path d="M807 125L898 190"/>
    <path d="M1152 126L1066 190"/>
    <path d="M1202 276L1088 257"/>
    <path d="M1012 395L995 333"/>
    <path d="M777 304L873 270"/>
  </g>

  <g fill="#0c211b" stroke="#e9c28d" stroke-width="3">
    <circle cx="807" cy="125" r="15"/>
    <circle cx="1152" cy="126" r="15"/>
    <circle cx="1202" cy="276" r="15"/>
    <circle cx="1012" cy="395" r="15"/>
    <circle cx="777" cy="304" r="15"/>
  </g>
  <g fill="#f6efdf">
    <circle cx="807" cy="125" r="4"/>
    <circle cx="1152" cy="126" r="4"/>
    <circle cx="1202" cy="276" r="4"/>
    <circle cx="1012" cy="395" r="4"/>
    <circle cx="777" cy="304" r="4"/>
  </g>

  <g transform="translate(887 151) rotate(-8 67 91)" filter="url(#shadow)">
    <rect width="134" height="182" rx="12" fill="url(#card)" stroke="#cbbda8" stroke-width="2"/>
    <text x="17" y="42" fill="#171c19" font-family="Georgia, Times New Roman, serif" font-size="34" font-weight="700">A</text>
    <path d="M29 55C14 69 12 77 29 91C46 77 44 69 29 55Z" fill="#171c19"/>
    <path d="M25 84H33L38 99H20Z" fill="#171c19"/>
    <path d="M67 67C36 96 38 120 67 145C96 120 98 96 67 67Z" fill="#171c19"/>
    <path d="M58 134H76L87 163H47Z" fill="#171c19"/>
  </g>

  <g transform="translate(985 143) rotate(9 67 91)" filter="url(#shadow)">
    <rect width="134" height="182" rx="12" fill="url(#card)" stroke="#cbbda8" stroke-width="2"/>
    <text x="17" y="42" fill="#b33f43" font-family="Georgia, Times New Roman, serif" font-size="34" font-weight="700">K</text>
    <path d="M29 91C9 76 15 58 29 68C43 58 49 76 29 91Z" fill="#b33f43"/>
    <path d="M67 148C25 116 38 77 67 98C96 77 109 116 67 148Z" fill="#b33f43"/>
  </g>

  <g transform="translate(835 300)" filter="url(#shadow)">
    <ellipse cx="0" cy="28" rx="31" ry="10" fill="#825136"/>
    <rect x="-31" y="8" width="62" height="20" fill="#bd7847"/>
    <ellipse cx="0" cy="8" rx="31" ry="10" fill="#e1a268" stroke="#f0c58a" stroke-width="2"/>
    <ellipse cx="0" cy="8" rx="18" ry="5" fill="#875338"/>
    <rect x="-27" y="-8" width="54" height="16" fill="#9b633f"/>
    <ellipse cx="0" cy="-8" rx="27" ry="9" fill="#d18b53" stroke="#f0c58a" stroke-width="2"/>
    <ellipse cx="0" cy="-8" rx="15" ry="4" fill="#73452f"/>
  </g>

  <g transform="translate(1080 319)" font-family="Aptos, Segoe UI, sans-serif">
    <rect x="-6" y="-3" width="112" height="30" rx="15" fill="#06110d" stroke="#d9aa70" stroke-opacity="0.58"/>
    <circle cx="13" cy="12" r="5" fill="#58b38c"/>
    <text x="27" y="17" fill="#e5d4b9" font-size="11" font-weight="700" letter-spacing="1">VERIFIED DEAL</text>
  </g>
</svg>
